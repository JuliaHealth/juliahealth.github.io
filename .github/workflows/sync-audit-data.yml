name: Sync Audit Data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [audit-data-updated]

permissions:
  contents: write

jobs:
  sync-audit-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.target_branch || 'main' }}
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: JuliaHealth/JuliaHealthAudit
          ref: main
          path: _audit_source

      - name: Copy audit data
        run: |
          set -e

          src="_audit_source/data"
          dst="assets/data/audit"

          mkdir -p "$dst"

          # --- RESULTS (only selected CSVs) ---
          rm -rf "$dst/results"
          mkdir -p "$dst/results"

          cp "$src/results/audit_packages.csv" "$dst/results/" || true
          cp "$src/results/audit_non_packages.csv" "$dst/results/" || true
          cp "$src/results/audit_contributors.csv" "$dst/results/" || true

          # --- VISUALIZATIONS (all PNGs) ---
          rsync -av --delete "$src/visualizations/" "$dst/visualizations/"

          # --- HISTORY (all CSVs) ---
          rsync -av --delete "$src/history/" "$dst/history/" || true

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - uses: julia-actions/cache@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Render site
        run: quarto render

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage EVERYTHING relevant (handles CSV + PNG correctly)
          git add -A assets/data/audit docs

          ts=$(date -u +"%Y-%m-%d %H:%M:%SZ")
          git commit -m "chore(audit): sync audit data (${ts})" || echo "No changes"

          git push
